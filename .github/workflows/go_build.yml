name: Build Go

on:
    push:
      # Sequence of patterns matched against refs/tags
      tags:
        - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  

jobs:
    build:
        name: Create Release
        runs-on: ubuntu-latest
        steps:
        - name: Golang Action
          uses: cedrickring/golang-action@1.6.0        
        - name: Checkout code
          uses: actions/checkout@v2
        - run: cd backend/cmd/api
        - run: go build .
       
