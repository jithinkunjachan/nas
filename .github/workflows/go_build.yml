name: Build Go

on: 
  push:
    tags:
    - '*'
  
jobs:
    build:
        name: Create Release
        runs-on: ubuntu-latest
        steps:
        - name: Golang Action
          uses: cedrickring/golang-action@1.6.0        
        - name: Checkout code
          uses: actions/checkout@v2
        - run: cd backend/cmd/api
        - run: go build .
       
